<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#1e3a5f">
    <title>KAIROS - Control de Asistencia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="kairos-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #1e3a5f;
            --primary-dark: #152a45;
            --accent: #3B82F6;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #F3F4F6;
            --white: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        #loginPage { min-height: 100vh; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--white); border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-logo { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .login-logo i { font-size: 28px; color: white; }
        .login-card h1 { color: var(--primary); text-align: center; font-size: 28px; margin-bottom: 4px; }
        .login-card .subtitle { text-align: center; color: var(--text-light); margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; background: #FAFAFA; }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: var(--primary-dark); }
        .btn:disabled { background: #9CA3AF; }
        .login-msg { text-align: center; margin-top: 16px; font-size: 14px; }
        .login-msg.error { color: var(--danger); }
        .login-msg.success { color: var(--success); }
        #dashboardPage { display: none; }
        .mobile-header { display: none; background: var(--primary); color: white; padding: 12px 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; justify-content: space-between; align-items: center; }
        .sidebar-overlay { display: none; position: fixed; top: 50px; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); color: white; padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar-logo .logo { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .sidebar-logo span { font-size: 20px; font-weight: 700; }
        .sidebar-nav a { display: block; padding: 14px 20px; color: rgba(255,255,255,0.8); text-decoration: none; cursor: pointer; }
        .sidebar-nav a:hover { background: rgba(255,255,255,0.1); color: white; }
        .logout-btn { margin: 20px; background: rgba(239,68,68,0.2); color: #EF4444; padding: 14px 20px; border-radius: 10px; }
        .main-content { flex: 1; margin-left: 260px; padding: 20px; background: var(--bg); min-height: 100vh; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-header h1 { color: var(--primary); font-size: 24px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .card { background: var(--white); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .card h2 { color: var(--primary); margin-bottom: 16px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #F9FAFB; font-weight: 600; font-size: 13px; color: var(--text-light); }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-on-time { background: #D1FAE5; color: #065F46; }
        .status-late { background: #FEE2E2; color: #991B1B; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: var(--white); border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { color: var(--primary); }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: 700; color: var(--primary); }
        .stat-label { color: var(--text-light); font-size: 14px; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; display: none; left: -260px; width: 260px; z-index: 200; }
            .sidebar.show { display: block; left: 0; }
            .main-content { margin-left: 0; padding: 16px; }
            .mobile-header { display: flex !important; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .page-header h1 { font-size: 20px; }
            .card { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stat-number { font-size: 24px; }
            table { font-size: 13px; }
            th, td { padding: 8px; }
            .form-row { grid-template-columns: 1fr; }
        }
        @media (min-width: 769px) {
            .sidebar-overlay, .mobile-header { display: none !important; }
            .sidebar { display: block; position: fixed; left: 0; }
            .main-content { margin-left: 260px; }
        }
    </style>
</head>
<body>
    <div id="loginPage">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-school"></i></div>
            <h1>KAIROS</h1>
            <p class="subtitle">Control de Asistencia</p>
            <div class="form-group">
                <label>Correo</label>
                <input type="email" id="loginEmail" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" placeholder="********">
            </div>
            <button class="btn" id="loginBtn" onclick="hacerLogin()">Iniciar Sesión</button>
            <p id="loginMsg" class="login-msg"></p>
        </div>
    </div>

    <div id="dashboardPage">
        <div class="mobile-header">
            <span style="font-size:24px;cursor:pointer;" onclick="toggleMenu()">☰</span>
            <span style="font-weight:bold;">KAIROS</span>
        </div>
        <div class="sidebar-overlay" id="overlay" onclick="closeMenu()"></div>
        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-logo">
                    <div class="logo"><i class="fas fa-school"></i></div>
                    <span>KAIROS</span>
                </div>
                <nav class="sidebar-nav" id="sidebarNav"></nav>
            </aside>
            <main class="main-content">
                <div class="page-header">
                    <h1 id="pageTitle">Inicio</h1>
                </div>
                <div id="mainContentInner"></div>
            </main>
        </div>
    </div>

    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Agregar Estudiante</h3>
                <button class="modal-close" onclick="cerrarModal('studentModal')">×</button>
            </div>
            <form onsubmit="guardarEstudiante(event)">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" name="nombre" required>
                </div>
                <div class="form-group">
                    <label>Correo (para enviar QR) *</label>
                    <input type="email" name="email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Teléfono *</label>
                    <input type="tel" name="telefono" required>
                </div>
                <div class="form-group">
                    <label>Tutor *</label>
                    <input type="text" name="tutor" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Curso</label>
                        <select name="grado" required>
                            <option value="1">1er Año</option>
                            <option value="2">2do Año</option>
                            <option value="3">3er Año</option>
                            <option value="4">4to Año</option>
                            <option value="5">5to Año</option>
                            <option value="6">6to Año</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Paralelo</label>
                        <select name="grupo" required>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn">Guardar</button>
            </form>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Mi Cuenta</h3>
                <button class="modal-close" onclick="cerrarModal('userModal')">×</button>
            </div>
            <div style="text-align:center;padding:20px;">
                <h2 id="userModalNombre" style="margin-bottom:20px;"></h2>
                <button class="btn" style="background:#EF4444;" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>QR del Estudiante</h3>
                <button class="modal-close" onclick="cerrarModal('qrModal')">×</button>
            </div>
            <div id="qrModalContent"></div>
        </div>
    </div>

    <script>
        var fc = { apiKey: "YOUR_FIREBASE_API_KEY", authDomain: "your-project.firebaseapp.com", projectId: "your-project", storageBucket: "your-project.firebasestorage.app", messagingSenderId: "YOUR_SENDER_ID", appId: "YOUR_APP_ID" };
        firebase.initializeApp(fc);
        var auth = firebase.auth();
        var db = firebase.firestore();
        
        if (typeof emailjs !== 'undefined') {
            emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");
        }
        
        function sendQREmail(email, nombre, codigo, qrUrl) {
            var qrImageUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(codigo);
            
            if (typeof emailjs === 'undefined') {
                console.error('EmailJS not loaded');
                return Promise.reject('EmailJS not loaded');
            }
            
            return emailjs.send('service_ks7xe43', 'template_kairos', {
                to_email: email,
                to_name: nombre,
                codigo: codigo,
                qr_image: qrImageUrl
            });
        }
        
        var currentUser = null, currentRole = 'profesor', estudiantes = [], asistencia = [], horaLimiteGlobal = '07:45', toleranciaMinutos = 15;
        var html5QrcodeScanner = null, qrScannerActivo = false;
        
        window.onload = function() {
            var uid = localStorage.getItem('kairos_uid');
            var email = localStorage.getItem('kairos_email');
            if (uid && email) { 
                auth.currentUser.getIdTokenResult().then(function() {
                    currentUser = {uid: uid, email: email}; 
                    cargarDatosUsuario(uid, email);
                }).catch(function() {
                    localStorage.removeItem('kairos_uid');
                    localStorage.removeItem('kairos_email');
                });
            }
        };
        
        function hacerLogin() {
            var email = document.getElementById('loginEmail').value;
            var pass = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');
            var msg = document.getElementById('loginMsg');
            
            if (!email || !pass) {
                msg.textContent = 'Ingresa correo y contraseña';
                msg.className = 'login-msg error';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Cargando...';
            msg.textContent = 'Iniciando sesión...';
            msg.className = 'login-msg';
            msg.style.color = '#6B7280';
            
            auth.signInWithEmailAndPassword(email, pass)
                .then(function(userCredential) {
                    console.log('Login success, uid:', userCredential.user.uid);
                    localStorage.setItem('kairos_uid', userCredential.user.uid);
                    localStorage.setItem('kairos_email', email);
                    currentUser = {uid: userCredential.user.uid, email: email};
                    return db.collection('usuarios').doc(userCredential.user.uid).get();
                })
                .then(function(doc) {
                    var nombre = email.split('@')[0];
                    var rol = 'profesor';
                    if (doc.exists) {
                        if (doc.data().nombre) nombre = doc.data().nombre;
                        if (doc.data().rol) rol = doc.data().rol;
                    }
                    currentUser.nombre = nombre;
                    currentRole = rol;
                    msg.textContent = '¡Bienvenido ' + nombre + '!';
                    msg.className = 'login-msg success';
                    msg.style.color = '';
                    setTimeout(function() { mostrarDashboard(); cargarDatos(); }, 500);
                })
                .catch(function(err) {
                    console.error('Login error:', err);
                    msg.textContent = 'Error: ' + err.message;
                    msg.className = 'login-msg error';
                    msg.style.color = '';
                    btn.disabled = false;
                    btn.textContent = 'Iniciar Sesión';
                });
        }
        
        function mostrarDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
            renderNav();
            showInicio();
        }
        
        function getRoleLabel(rol) {
            var labels = {direccion: 'Dirección', profesor: 'Profesor', regente: 'Regente'};
            return labels[rol] || rol;
        }
        
        function toggleMenu() {
            var sidebar = document.querySelector('.sidebar');
            var overlay = document.getElementById('overlay');
            if (sidebar.classList.contains('show')) {
                sidebar.classList.remove('show');
                overlay.style.display = 'none';
            } else {
                sidebar.classList.add('show');
                overlay.style.display = 'block';
            }
        }
        
        function closeMenu() {
            document.querySelector('.sidebar').classList.remove('show');
            document.getElementById('overlay').style.display = 'none';
        }
        
        function stopQRScanner() {
            if (qrScannerActivo && html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(function() {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                    qrScannerActivo = false;
                }).catch(function() {
                    html5QrcodeScanner = null;
                    qrScannerActivo = false;
                });
            }
        }
        
        function renderNav() {
            var items = [];
            if (currentRole === 'direccion') {
                items = [
                    {t:'<i class="fas fa-home"></i> Inicio', a:'showInicio()'},
                    {t:'<i class="fas fa-users"></i> Estudiantes', a:'showEstudiantes()'},
                    {t:'<i class="fas fa-user-plus"></i> Agregar', a:'showAgregarEstudiante()'},
                    {t:'<i class="fas fa-clipboard-list"></i> Registros', a:'showRegistros()'},
                    {t:'<i class="fas fa-clock"></i> Horarios', a:'showHorarios()'},
                    {t:'<i class="fas fa-chart-bar"></i> Estadísticas', a:'showEstadisticas()'},
                    {t:'<i class="fas fa-user-cog"></i> Usuarios', a:'showUsuarios()'}
                ];
            } else if (currentRole === 'regente') {
                items = [
                    {t:'<i class="fas fa-home"></i> Inicio', a:'showInicio()'},
                    {t:'<i class="fas fa-qrcode"></i> Escanear QR', a:'showQRScanner()'},
                    {t:'<i class="fas fa-users"></i> Estudiantes', a:'showEstudiantes()'},
                    {t:'<i class="fas fa-user-plus"></i> Agregar', a:'showAgregarEstudiante()'},
                    {t:'<i class="fas fa-clipboard-list"></i> Registros', a:'showRegistros()'}
                ];
            } else {
                items = [
                    {t:'<i class="fas fa-home"></i> Inicio', a:'showInicio()'},
                    {t:'<i class="fas fa-qrcode"></i> Escanear QR', a:'showQRScanner()'},
                    {t:'<i class="fas fa-user-plus"></i> Agregar', a:'showAgregarEstudiante()'},
                    {t:'<i class="fas fa-clipboard-list"></i> Registros', a:'showRegistros()'}
                ];
            }
            items.push({t:'<i class="fas fa-sign-out-alt"></i> Cerrar Sesión', a:'cerrarSesion()'});
            var html = '';
            for (var i = 0; i < items.length; i++) {
                html += '<a onclick="' + items[i].a + ';closeMenu()">' + items[i].t + '</a>';
            }
            document.getElementById('sidebarNav').innerHTML = html;
        }
        
        function showInicio() {
            stopQRScanner();
            document.getElementById('pageTitle').textContent = 'Inicio';
            var hoy = new Date().toISOString().split('T')[0];
            var asistenciaHoy = [];
            for (var i = 0; i < asistencia.length; i++) {
                if (asistencia[i].fecha === hoy) asistenciaHoy.push(asistencia[i]);
            }
            
            var html = '<div class="stats-grid">' +
                '<div class="stat-card"><div class="stat-number">' + estudiantes.length + '</div><div class="stat-label">Estudiantes</div></div>' +
                '<div class="stat-card"><div class="stat-number">' + asistenciaHoy.length + '</div><div class="stat-label">Registros Hoy</div></div>' +
                '<div class="stat-card"><div class="stat-number">' + (estudiantes.length > 0 ? Math.round(asistenciaHoy.length / estudiantes.length * 100) : 0) + '%</div><div class="stat-label">Asistencia</div></div>' +
                '</div>';
            
            html += '<div class="card"><h2>Registros de Hoy</h2>';
            if (asistenciaHoy.length === 0) {
                html += '<p style="color:#666;text-align:center;padding:20px;">No hay registros hoy</p>';
            } else {
                html += '<table><thead><tr><th>Nombre</th><th>Curso</th><th>Hora</th><th>Estado</th></tr></thead><tbody>';
                for (var i = 0; i < asistenciaHoy.length; i++) {
                    var est = null;
                    for (var j = 0; j < estudiantes.length; j++) {
                        if (estudiantes[j].id === asistenciaHoy[i].estudianteId) { est = estudiantes[j]; break; }
                    }
                    var nombre = est ? est.nombre : 'Desconocido';
                    var curso = est ? est.curso + '° ' + (est.paralelo || '') : '-';
                    var badgeClass = asistenciaHoy[i].estado === 'on-time' ? 'status-on-time' : 'status-late';
                    var badgeText = asistenciaHoy[i].estado === 'on-time' ? 'A Tiempo' : 'Tarde';
                    html += '<tr><td>' + nombre + '</td><td>' + curso + '</td><td>' + asistenciaHoy[i].hora + '</td><td><span class="status-badge ' + badgeClass + '">' + badgeText + '</span></td></tr>';
                }
                html += '</tbody></table>';
            }
            html += '</div>';
            document.getElementById('mainContentInner').innerHTML = html;
        }
        
        function showEstudiantes() {
            stopQRScanner();
            document.getElementById('pageTitle').textContent = 'Estudiantes';
            var html = '<div class="card"><table><thead><tr><th>Nombre</th><th>Curso</th><th>Código</th></tr></thead><tbody>';
            for (var i = 0; i < estudiantes.length; i++) {
                html += '<tr><td>' + (estudiantes[i].nombre || '') + '</td><td>' + (estudiantes[i].curso || '') + '° ' + (estudiantes[i].paralelo || '') + '</td><td>' + (estudiantes[i].codigo || '-') + '</td></tr>';
            }
            html += '</tbody></table></div>';
            document.getElementById('mainContentInner').innerHTML = html;
        }
        
        function showAgregarEstudiante() {
            stopQRScanner();
            closeMenu();
            document.getElementById('studentModal').classList.add('show');
        }
        
        function showRegistros() {
            stopQRScanner();
            document.getElementById('pageTitle').textContent = 'Registros';
            var html = '<div class="card">' +
                '<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">' +
                '<label style="font-weight:600;">Desde:</label>' +
                '<input type="date" id="fechaDesde" value="' + new Date().toISOString().split('T')[0] + '" onchange="filtrarRegistros()" style="padding:10px;border:2px solid #ddd;border-radius:8px;">' +
                '<label style="font-weight:600;">Hasta:</label>' +
                '<input type="date" id="fechaHasta" value="' + new Date().toISOString().split('T')[0] + '" onchange="filtrarRegistros()" style="padding:10px;border:2px solid #ddd;border-radius:8px;">' +
                '<button onclick="verTodosRegistros()" class="btn" style="padding:10px 20px;">Ver Todos</button>' +
                '</div>' +
                '<div id="registrosContent"><p>Cargando...</p></div></div>';
            document.getElementById('mainContentInner').innerHTML = html;
            filtrarRegistros();
        }
        
        function filtrarRegistros() {
            var desde = document.getElementById('fechaDesde').value;
            var hasta = document.getElementById('fechaHasta').value;
            if (!desde || !hasta) { verTodosRegistros(); return; }
            db.collection('asistencia').where('fecha', '>=', desde).where('fecha', '<=', hasta).get()
            .then(function(snapshot) {
                var html = '<table><thead><tr><th>Fecha</th><th>Nombre</th><th>Curso</th><th>Hora</th><th>Estado</th></tr></thead><tbody>';
                if (snapshot.empty) {
                    html += '<tr><td colspan="5" style="text-align:center;">No hay registros</td></tr>';
                } else {
                    var regs = [];
                    snapshot.forEach(function(doc) {
                        regs.push({id: doc.id, data: doc.data()});
                    });
                    regs.sort(function(a,b) { return a.data.fecha + a.data.hora > b.data.fecha + b.data.hora ? -1 : 1; });
                    for (var i = 0; i < regs.length; i++) {
                        var est = null;
                        for (var j = 0; j < estudiantes.length; j++) {
                            if (estudiantes[j].id === regs[i].data.estudianteId) { est = estudiantes[j]; break; }
                        }
                        var nombre = est ? est.nombre : 'Desconocido';
                        var curso = est ? est.curso + '°' + (est.paralelo || '') : '-';
                        var badgeClass = regs[i].data.estado === 'on-time' ? 'status-on-time' : 'status-late';
                        var badgeText = regs[i].data.estado === 'on-time' ? 'A Tiempo' : 'Tarde';
                        html += '<tr><td>' + regs[i].data.fecha + '</td><td>' + nombre + '</td><td>' + curso + '</td><td>' + regs[i].data.hora + '</td><td><span class="status-badge ' + badgeClass + '">' + badgeText + '</span></td></tr>';
                    }
                }
                html += '</tbody></table>';
                document.getElementById('registrosContent').innerHTML = html;
            });
        }
        
        function verTodosRegistros() {
            var html = '<table><thead><tr><th>Fecha</th><th>Nombre</th><th>Curso</th><th>Hora</th><th>Estado</th></tr></thead><tbody>';
            if (asistencia.length === 0) {
                html += '<tr><td colspan="5" style="text-align:center;">No hay registros</td></tr>';
            } else {
                var regs = asistencia.slice().sort(function(a,b) { return a.fecha + a.hora > b.fecha + b.hora ? -1 : 1; });
                for (var i = 0; i < regs.length; i++) {
                    var est = null;
                    for (var j = 0; j < estudiantes.length; j++) {
                        if (estudiantes[j].id === regs[i].estudianteId) { est = estudiantes[j]; break; }
                    }
                    var nombre = est ? est.nombre : 'Desconocido';
                    var curso = est ? est.curso + '°' + (est.paralelo || '') : '-';
                    var badgeClass = regs[i].estado === 'on-time' ? 'status-on-time' : 'status-late';
                    var badgeText = regs[i].estado === 'on-time' ? 'A Tiempo' : 'Tarde';
                    html += '<tr><td>' + regs[i].fecha + '</td><td>' + nombre + '</td><td>' + curso + '</td><td>' + regs[i].hora + '</td><td><span class="status-badge ' + badgeClass + '">' + badgeText + '</span></td></tr>';
                }
            }
            html += '</tbody></table>';
            document.getElementById('registrosContent').innerHTML = html;
        }
        
        function showHorarios() {
            stopQRScanner();
            document.getElementById('pageTitle').textContent = 'Horarios';
            document.getElementById('mainContentInner').innerHTML = '<div class="card">' +
                '<h2><i class="fas fa-clock"></i> Configuración de Entrada</h2>' +
                '<div class="form-group">' +
                '<label>Hora de Entrada</label>' +
                '<input type="time" id="horaLimite" value="' + horaLimiteGlobal + '" style="padding:10px;border:2px solid #ddd;border-radius:8px;width:100%;">' +
                '</div>' +
                '<div class="form-group">' +
                '<label>Tolerancia (minutos después de la hora de entrada)</label>' +
                '<input type="number" id="toleranciaMinutos" value="' + toleranciaMinutos + '" min="0" max="60" style="padding:10px;border:2px solid #ddd;border-radius:8px;width:100%;">' +
                '</div>' +
                '<p style="color:#666;margin-bottom:12px;font-size:13px;">Los estudiantes que lleguen hasta ' + toleranciaMinutos + ' minutos después de las ' + horaLimiteGlobal + ' se marcan como "A Tiempo".</p>' +
                '<button class="btn" onclick="guardarConfig()">Guardar</button></div>';
        }
        
        function showEstadisticas() {
            stopQRScanner();
            document.getElementById('pageTitle').textContent = 'Estadísticas';
            var html = '<div class="stats-grid">' +
                '<div class="stat-card"><div class="stat-number">' + estudiantes.length + '</div><div class="stat-label">Estudiantes</div></div>' +
                '<div class="stat-card"><div class="stat-number">' + asistencia.length + '</div><div class="stat-label">Registros</div></div>' +
                '</div>';
            var cursos = {};
            for (var i = 0; i < estudiantes.length; i++) {
                var key = estudiantes[i].curso + '° ' + (estudiantes[i].paralelo || '');
                if (!cursos[key]) cursos[key] = 0;
                cursos[key]++;
            }
            html += '<div class="card"><table><thead><tr><th>Curso</th><th>Cantidad</th></tr></thead><tbody>';
            for (var c in cursos) {
                html += '<tr><td>' + c + '</td><td>' + cursos[c] + '</td></tr>';
            }
            html += '</tbody></table></div>';

        function showUsuarios() {
            stopQRScanner();
            document.getElementById('pageTitle').textContent = 'Usuarios';
            document.getElementById('mainContentInner').innerHTML = '<div class="card"><p>Cargando...</p></div>';
            db.collection('usuarios').get().then(function(snapshot) {
                var html = '<div class="card"><table><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th></tr></thead><tbody>';
                if (snapshot.empty) {
                    html += '<tr><td colspan="3">No hay usuarios</td></tr>';
                } else {
                    snapshot.forEach(function(doc) {
                        var u = doc.data();
                        html += '<tr><td>' + (u.nombre || '-') + '</td><td>' + (u.email || '-') + '</td><td>' + getRoleLabel(u.rol) + '</td></tr>';
                    });
                }
                html += '</tbody></table></div>';
                document.getElementById('mainContentInner').innerHTML = html;
            });
        }
        
function showQRScanner() {
            stopQRScanner();
            document.getElementById('pageTitle').textContent = 'Escanear QR';
            document.getElementById('mainContentInner').innerHTML = '<div class="card" style="text-align:center;"><h2>Escanear QR</h2><div id="qr-reader" style="width:100%;max-width:300px;margin:0 auto;"></div><div id="scanResult" style="margin-top:20px;"></div></div>';
            
            setTimeout(function() {
                if (html5QrcodeScanner) {
                    try { html5QrcodeScanner.clear(); } catch(e) {}
                }
                html5QrcodeScanner = new Html5Qrcode("qr-reader");
                qrScannerActivo = true;
                html5QrcodeScanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    function(decodedText) {
                        try {
                            var data = JSON.parse(decodedText);
                            var estudianteId = data.id;
                            var est = null;
                            for (var i = 0; i < estudiantes.length; i++) {
                                if (estudiantes[i].id === estudianteId) { est = estudiantes[i]; break; }
                            }
                            if (!est) {
                                document.getElementById('scanResult').innerHTML = '<p style="color:red;">Estudiante no encontrado</p>';
                                return;
                            }
                            var ahora = new Date();
                            var hora = ahora.toTimeString().split(' ')[0].substring(0, 5);
                            var fecha = ahora.toISOString().split('T')[0];
                            var partes = horaLimiteGlobal.split(':');
                            var horaLimite = new Date();
                            horaLimite.setHours(parseInt(partes[0]), parseInt(partes[1]) + toleranciaMinutos, 0);
                            var estado = ahora <= horaLimite ? 'on-time' : 'late';
                            
                            db.collection('asistencia').add({
                                estudianteId: estudianteId,
                                fecha: fecha,
                                hora: hora,
                                estado: estado
                            }).then(function() {
                                document.getElementById('scanResult').innerHTML = '<p style="color:green;">¡Registrado! - ' + est.nombre + '</p>';
                                cargarDatos();
                            }).catch(function(err) {
                                document.getElementById('scanResult').innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
                            });
                        } catch(e) {
                            document.getElementById('scanResult').innerHTML = '<p style="color:red;">Código inválido</p>';
                        }
                    },
                    function(errorMessage) {
                        console.log('QR scan error:', errorMessage);
                    }
                ).catch(function(err) {
                    document.getElementById('scanResult').innerHTML = '<p style="color:red;">Error de cámara: ' + err + '</p>';
                });
            }, 100);
        }
        
        function guardarConfig() {
            var horaLimite = document.getElementById('horaLimite').value;
            var tolerancia = parseInt(document.getElementById('toleranciaMinutos').value) || 15;
            db.collection('config').doc('general').set({ horaLimite: horaLimite, toleranciaMinutos: tolerancia }, { merge: true })
                .then(function() { 
                    horaLimiteGlobal = horaLimite;
                    toleranciaMinutos = tolerancia;
                    alert('Guardado'); 
                });
        }
        
        function cerrarModal(id) {
            document.getElementById(id).classList.remove('show');
        }
        
        function mostrarUserModal() {
            document.getElementById('userModalNombre').textContent = currentUser.nombre;
            document.getElementById('userModal').classList.add('show');
        }
        
function guardarEstudiante(e) {
            e.preventDefault();
            var f = new FormData(e.target);
            var codigo = Math.floor(100000 + Math.random() * 900000).toString();
            var emailEstudiante = f.get('email');
            var nombreEstudiante = f.get('nombre');
            
            var estudianteData = {
                nombre: nombreEstudiante,
                email: emailEstudiante,
                telefono: f.get('telefono'),
                tutor: f.get('tutor'),
                curso: f.get('grado'),
                paralelo: f.get('grupo'),
                codigo: codigo
            };
            
            document.getElementById('qrModalContent').innerHTML = '<div style="text-align:center;padding:40px;"><h3>⏳ Guardando estudiante...</h3></div>';
            document.getElementById('qrModal').classList.add('show');
            
            db.collection('estudiantes').add(estudianteData).then(function(docRef) {
                var qrImageUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(codigo);
                
                document.getElementById('qrModalContent').innerHTML = '<div style="text-align:center;padding:40px;"><h3>📧 Enviando email con QR...</h3><p style="color:#666;">Esto puede tomar unos segundos...</p></div>';
                
                return emailjs.send('service_ks7xe43', 'template_kairos', {
                    to_email: emailEstudiante,
                    to_name: nombreEstudiante,
                    codigo: codigo,
                    qr_image: qrImageUrl
                });
            }).then(function(response) {
                var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(codigo);
                var htmlQR = '<div style="text-align:center;padding:20px;">' +
                    '<h3 style="color:#10B981;font-size:24px;">✅ ¡Todo Listo!</h3>' +
                    '<p style="color:#10B981;font-size:16px;">📧 Email con QR enviado a ' + emailEstudiante + '</p>' +
                    '<p style="font-size:18px;margin-top:15px;">Código del estudiante: <strong style="font-size:28px;color:#1e3a5f;">' + codigo + '</strong></p>' +
                    '<img src="' + qrUrl + '" style="border:4px solid #1e3a5f;padding:15px;border-radius:12px;margin:20px 0;width:220px;">' +
                    '<br><a href="' + qrUrl + '" download="QR-' + codigo + '.png" class="btn" style="display:inline-block;background:#10B981;">💾 Descargar QR</a>' +
                    '<br><br><button onclick="cerrarModal(\'qrModal\')" class="btn" style="background:#666;width:200px;">Cerrar</button>' +
                    '</div>';
                document.getElementById('qrModalContent').innerHTML = htmlQR;
            }).catch(function(err) {
                console.error('EmailJS error:', err);
                var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(codigo);
                var mailtoLink = 'mailto:' + emailEstudiante + '?subject=' + encodeURIComponent('🎓 Tu Código QR - KAIROS') + '&body=' + encodeURIComponent('Tu código es: ' + codigo + '\n\nTu QR: ' + qrUrl + '\n\nGuarda el QR para registrar tu asistencia.');
                
                var htmlQR = '<div style="text-align:center;padding:20px;">' +
                    '<h3 style="color:#10B981;font-size:24px;">✅ Estudiante Guardado</h3>' +
                    '<p style="color:orange;font-size:14px;">⚠️ Email automático no llegó</p>' +
                    '<p style="font-size:18px;">Código: <strong style="font-size:28px;color:#1e3a5f;">' + codigo + '</strong></p>' +
                    '<img src="' + qrUrl + '" style="border:4px solid #1e3a5f;padding:15px;border-radius:12px;margin:20px 0;width:220px;">' +
                    '<br><a href="' + qrUrl + '" download="QR-' + codigo + '.png" class="btn" style="display:inline-block;background:#10B981;">💾 Descargar QR</a>' +
                    '<br><br><a href="' + mailtoLink + '" class="btn" style="display:inline-block;background:#EA4335;">📧 Enviar por Email</a>' +
                    '<br><br><button onclick="cerrarModal(\'qrModal\')" class="btn" style="background:#666;">Cerrar</button>' +
                    '</div>';
                document.getElementById('qrModalContent').innerHTML = htmlQR;
            }).finally(function() {
                cerrarModal('studentModal');
                e.target.reset();
                cargarDatos();
            });
        }
        
        function cargarDatosUsuario(uid, email) {
            db.collection('usuarios').doc(uid).get()
                .then(function(doc) {
                    var nombre = email.split('@')[0];
                    var rol = 'profesor';
                    if (doc.exists) {
                        if (doc.data().nombre) nombre = doc.data().nombre;
                        if (doc.data().rol) rol = doc.data().rol;
                    }
                    currentUser.nombre = nombre;
                    currentRole = rol;
                    mostrarDashboard();
                    cargarDatos();
                })
                .catch(function() {
                    currentUser.nombre = email.split('@')[0];
                    currentRole = 'profesor';
                    mostrarDashboard();
                    cargarDatos();
                });
        }
        
        function cargarDatos() {
            var hoy = new Date().toISOString().split('T')[0];
            Promise.all([
                db.collection('estudiantes').get(),
                db.collection('asistencia').where('fecha', '==', hoy).get(),
                db.collection('config').doc('general').get()
            ]).then(function(resultados) {
                estudiantes = [];
                for (var i = 0; i < resultados[0].docs.length; i++) {
                    var data = resultados[0].docs[i].data();
                    estudiantes.push({
                        id: resultados[0].docs[i].id,
                        nombre: data.nombre,
                        curso: data.curso,
                        paralelo: data.paralelo,
                        codigo: data.codigo
                    });
                }
                asistencia = [];
                for (var i = 0; i < resultados[1].docs.length; i++) {
                    var data = resultados[1].docs[i].data();
                    asistencia.push({
                        id: resultados[1].docs[i].id,
                        estudianteId: data.estudianteId,
                        fecha: data.fecha,
                        hora: data.hora,
                        estado: data.estado
                    });
                }
                if (resultados[2].exists && resultados[2].data().horaLimite) {
                    horaLimiteGlobal = resultados[2].data().horaLimite;
                }
                if (resultados[2].exists && resultados[2].data().toleranciaMinutos) {
                    toleranciaMinutos = resultados[2].data().toleranciaMinutos;
                }
                if (document.getElementById('dashboardPage').style.display === 'block') {
                    showInicio();
                }
            }).catch(function(err) {
                console.error('Error:', err);
            });
        }
        
        function cerrarSesion() {
            stopQRScanner();
            qrScannerActivo = false;
            firebase.auth().signOut().then(function() {
                localStorage.removeItem('kairos_uid');
                localStorage.removeItem('kairos_email');
                currentUser = null;
                location.reload();
            });
        }
    </script>
